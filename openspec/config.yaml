# openspec/config.yaml
schema: spec-driven

context: |
  Project: ARIA DAW (aria-studio) — modular next-generation DAW
  Stack: C++23 (primary), Rust (helper libs), TypeScript (UI), Lua (scripting), Python (dev scripts)
  Status: Active development. P0-P7 fully implemented and committed.
  Architecture: Monolithic C++ core layered over Rust workspace; CMake 3.28+ with FetchContent deps
  Testing: Catch2 v3.7.0 — 20+ test executables, 65 unit test files, CI on three platforms
  Conventions: C++23, Catch2 unit tests, CMake presets (debug/release/dist/sanitized)

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "ctest --preset debug --output-on-failure"
  verify:
    test_command: "ctest --preset debug --output-on-failure"
    build_command: "cmake --build --preset debug"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  reason: "Catch2 v3.7.0 detected with 65 unit test files across 20+ test executables. TDD enforcement is active."
  detected: 2026-06-28
  runners:
    - framework: Catch2
      version: "3.7.0"
      command: "ctest --preset debug"
  layers:
    unit: { available: true, tool: "Catch2 v3.7.0" }
    integration: { available: false, tool: "--" }
    e2e: { available: false, tool: "--" }
  coverage: { available: false, command: "--" }
  quality:
    linter:
      available: false
      command: "--"
      note: "No .clang-tidy for C++; Rust clippy + TS typecheck run in CI only"
    type_checker:
      available: false
      command: "--"
      note: "No C++ static analysis; TS typecheck available via pnpm typecheck"
    formatter:
      available: false
      command: "--"
      note: "No .clang-format configured"
